<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primary Admin — Alloc8</title>
  <style>
    :root {
      --primary: #1f4e79; --accent: #2e75b6; --bg: #f5f7fa; --panel: #ffffff;
      --border: #d0d7de; --text: #24292f; --muted: #57606a;
      --danger: #cf222e; --success: #1a7f37;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
    header {
      background: linear-gradient(90deg, var(--primary), var(--accent)); color: #fff;
      padding: 1rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem;
    }
    header h1 { margin: 0; font-size: 1.2rem; }
    .btn { border: none; padding: .5rem .8rem; border-radius: 6px; cursor: pointer; font-size: .9rem; font-weight: 600; }
    .btn-sm { padding: .35rem .55rem; font-size: .8rem; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #1f5c99; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #a3001c; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .container { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem 1.5rem; }
    .card h2 { margin: 0 0 .8rem; font-size: 1.05rem; color: var(--primary); }
    .hint { font-size: .85rem; color: var(--muted); margin-bottom: .8rem; }
    .toolbar { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .8rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    th, td { padding: .35rem .5rem; border: 1px solid var(--border); text-align: left; }
    thead tr { background: #f6f8fa; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: .5rem; }
    .project-card { background: #fafbfc; border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .project-card h3 { margin: 0 0 .4rem; font-size: .95rem; color: var(--primary); }
    .project-card .meta { font-size: .8rem; color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <h1>Alloc8 — Primary Admin</h1>
    <button class="btn btn-danger" id="logoutBtn">Log out</button>
  </header>

  <div class="container">

    <!-- All Projects Overview -->
    <div class="card">
      <h2>All Projects</h2>
      <p class="hint">Every project registered in the system with their admins and partner counts.</p>
      <div class="projects-grid" id="projectsGrid">
        <p style="color:var(--muted)">Loading...</p>
      </div>
    </div>

    <!-- Database Management -->
    <div class="card">
      <h2>Database Management</h2>
      <p class="hint">Direct database access. Use with caution — deletions are irreversible.</p>
      <div class="toolbar">
        <button class="btn btn-primary" onclick="showTable('users')">Users</button>
        <button class="btn btn-primary" onclick="showTable('tenants')">Projects</button>
        <button class="btn btn-primary" onclick="showTable('tenant_memberships')">Memberships</button>
        <button class="btn btn-primary" onclick="showTable('partners')">Partners</button>
        <button class="btn btn-primary" onclick="showTable('wps')">Work Packages</button>
        <button class="btn btn-primary" onclick="showTable('tasks')">Tasks</button>
        <button class="btn btn-primary" onclick="showTable('settings')">Settings</button>
        <button class="btn btn-danger" onclick="showTable('scraped_content')">Scraped Data</button>
        <button class="btn btn-danger" onclick="showTable('partner_ai_analysis')">AI Analysis</button>
        <button class="btn btn-danger" onclick="showTable('partner_wp_skills')">Skill Scores</button>
      </div>
      <div id="dbTableContainer" style="max-height:500px;overflow:auto;">
        <p style="color:var(--muted)">Select a table above to view data.</p>
      </div>
    </div>

  </div>

  <script>
    // Guard — only primary admin can access this page
    async function init() {
      const res = await fetch('/api/me');
      if (!res.ok) return window.location.href = '/login.html';
      const me = await res.json();
      if (!me.loggedIn || me.role !== 'admin' || me.username !== 'admin') {
        window.location.href = me.role === 'admin' ? '/admin.html' : '/login.html';
        return;
      }
      loadProjects();
    }

    async function loadProjects() {
      const [tenantsRes, usersRes, partnersRes] = await Promise.all([
        fetch('/api/admin/db/tenants'),
        fetch('/api/admin/db/users'),
        fetch('/api/admin/db/partners')
      ]);
      const tenants  = tenantsRes.ok  ? await tenantsRes.json()  : [];
      const users    = usersRes.ok    ? await usersRes.json()    : [];
      const partners = partnersRes.ok ? await partnersRes.json() : [];

      // Build lookup maps
      const membershipsRes = await fetch('/api/admin/db/tenant_memberships');
      const memberships = membershipsRes.ok ? await membershipsRes.json() : [];

      const grid = document.getElementById('projectsGrid');
      if (!tenants.length) {
        grid.innerHTML = '<p style="color:var(--muted)">No projects yet.</p>';
        return;
      }

      grid.innerHTML = tenants.map(t => {
        const members = memberships.filter(m => m.tenant_id === t.id);
        const adminMembers = members.map(m => {
          const u = users.find(u => u.id === m.user_id);
          return u ? `${u.username} (${m.role})` : `user#${m.user_id}`;
        });
        const partnerCount = partners.filter(p => p.tenant_id === t.id).length;
        return `
          <div class="project-card">
            <h3>${t.name}</h3>
            <div class="meta">
              <div><strong>ID:</strong> ${t.id}</div>
              <div><strong>Status:</strong> ${t.active ? 'Active' : 'Inactive'}</div>
              <div><strong>Partners:</strong> ${partnerCount}</div>
              <div><strong>Admins:</strong> ${adminMembers.join(', ') || '—'}</div>
              <div><strong>Created:</strong> ${t.created_at ? t.created_at.split('T')[0] : '—'}</div>
              ${t.description ? `<div><strong>Description:</strong> ${t.description}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    // Database table viewer
    let currentTable = '';
    window.showTable = async function(tableName) {
      currentTable = tableName;
      const container = document.getElementById('dbTableContainer');
      container.innerHTML = '<p style="color:var(--muted)">Loading...</p>';
      try {
        const res = await fetch(`/api/admin/db/${tableName}`);
        if (!res.ok) throw new Error('Failed to fetch');
        const data = await res.json();
        if (!data.length) {
          container.innerHTML = '<p style="color:var(--muted)">No data in this table.</p>';
          return;
        }
        const columns = Object.keys(data[0]);
        container.innerHTML = `
          <div style="margin-bottom:.5rem">
            <strong>${tableName}</strong> — ${data.length} row(s)
            <button class="btn btn-sm btn-danger" onclick="deleteAllRows('${tableName}')" style="margin-left:1rem">Delete All</button>
          </div>
          <table>
            <thead><tr>
              <th>Actions</th>
              ${columns.map(c => `<th>${c}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${data.map((row, idx) => `
                <tr>
                  <td><button class="btn btn-sm btn-danger" onclick="deleteRow('${tableName}',${row.id||idx})">Delete</button></td>
                  ${columns.map(c => {
                    let v = row[c];
                    if (v === null) v = '<em style="color:var(--muted)">null</em>';
                    else if (typeof v === 'object') v = JSON.stringify(v).substring(0,60);
                    else v = String(v).substring(0,120);
                    return `<td>${v}</td>`;
                  }).join('')}
                </tr>`).join('')}
            </tbody>
          </table>`;
      } catch (e) {
        container.innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`;
      }
    };

    window.deleteRow = async function(tableName, id) {
      if (!confirm(`Delete row ${id} from ${tableName}?`)) return;
      const res = await fetch(`/api/admin/db/${tableName}/${id}`, { method: 'DELETE' });
      if (res.ok) showTable(tableName);
      else alert('Failed to delete row');
    };

    window.deleteAllRows = async function(tableName) {
      if (!confirm(`DELETE ALL ROWS from ${tableName}? This cannot be undone!`)) return;
      const res = await fetch(`/api/admin/db/${tableName}`, { method: 'DELETE' });
      if (res.ok) showTable(tableName);
      else alert('Failed to delete rows');
    };

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    init();
  </script>
</body>
</html>

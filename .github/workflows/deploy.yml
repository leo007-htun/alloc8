name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to IONOS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            set -e

            # 1. Install Docker
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi

            # 2. Install dependencies
            apt-get update -qq
            apt-get install -y -qq nginx ufw curl certbot python3-certbot-nginx git

            # 3. Open firewall ports
            ufw allow OpenSSH
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable

            # 4. Clone or pull latest source code
            APP_DIR="/opt/alloc8"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://leo007-htun:${{ secrets.GH_TOKEN }}@github.com/leo007-htun/alloc8.git .
            fi

            # 5. Create persistence directories
            mkdir -p data uploads

            # 6. Write .env with secrets
            cat > .env <<ENVEOF
NODE_ENV=production
PORT=3000
DB_PATH=/app/data/data.sqlite
SESSION_SECRET=${{ secrets.SESSION_SECRET }}
RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
FROM_EMAIL=${{ secrets.FROM_EMAIL }}
BYTEZ_API_KEY=${{ secrets.BYTEZ_API_KEY }}
ENVEOF

            # 7. Stop old container
            docker stop alloc8-app 2>/dev/null || true
            docker rm   alloc8-app 2>/dev/null || true

            # 8. Build and run from source
            docker build -t alloc8-app:latest .
            docker run -d               --name alloc8-app               --restart unless-stopped               -p 3000:3000               -v /opt/alloc8/data:/app/data               -v /opt/alloc8/uploads:/app/public/uploads               --env-file /opt/alloc8/.env               alloc8-app:latest

            # 9. Issue SSL cert if not already present
            if [ ! -f /etc/letsencrypt/live/alloc8.org/fullchain.pem ]; then
              cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.org www.alloc8.org;
                location / { proxy_pass http://localhost:3000; }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx
              certbot certonly --nginx -d alloc8.org -d www.alloc8.org                 --non-interactive --agree-tos --email admin@alloc8.org
            else
              certbot renew --quiet
            fi

            # 10. Write full SSL nginx config
            cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.org www.alloc8.org;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name alloc8.org www.alloc8.org;
                ssl_certificate     /etc/letsencrypt/live/alloc8.org/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/alloc8.org/privkey.pem;
                include             /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
                location / {
                    proxy_pass         http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection upgrade;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    client_max_body_size 50M;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "Deployment complete - https://alloc8.org"

name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # Install Docker if needed
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi

            # Install dependencies
            apt-get update -qq
            apt-get install -y -qq nginx ufw curl certbot python3-certbot-nginx git

            # Firewall
            ufw allow OpenSSH
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable

            # Clone or pull latest source (public repo, no auth needed)
            APP_DIR="/opt/alloc8"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main
            else
              git clone https://github.com/leo007-htun/alloc8.git .
            fi

            mkdir -p data uploads

            # Stop old container
            docker stop alloc8-app 2>/dev/null || true
            docker rm   alloc8-app 2>/dev/null || true

            # Build image from source on VPS (correct arch, no buildx)
            docker build --no-cache --platform linux/amd64 -t alloc8-app:latest .

            # Run container
            docker run -d \
              --name alloc8-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /opt/alloc8/data:/app/data \
              -v /opt/alloc8/uploads:/app/public/uploads \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e DB_PATH=/app/data/data.sqlite \
              -e BASE_URL=https://alloc8.vulkron.uk \
              -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e FROM_EMAIL="${{ secrets.FROM_EMAIL }}" \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              alloc8-app:latest

            # SSL cert (first time only)
            if [ ! -f /etc/letsencrypt/live/alloc8.vulkron.uk/fullchain.pem ]; then
              cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.vulkron.uk;
                location / { proxy_pass http://localhost:3000; }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx
              certbot certonly --nginx -d alloc8.vulkron.uk \
                --non-interactive --agree-tos --email ${{ secrets.CERTBOT_EMAIL }}
            else
              certbot renew --quiet
            fi

            # Nginx SSL config
            cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.vulkron.uk;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name alloc8.vulkron.uk;
                ssl_certificate     /etc/letsencrypt/live/alloc8.vulkron.uk/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/alloc8.vulkron.uk/privkey.pem;
                include             /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
                location / {
                    proxy_pass         http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection upgrade;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    client_max_body_size 50M;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "Deployment complete - https://alloc8.vulkron.uk"

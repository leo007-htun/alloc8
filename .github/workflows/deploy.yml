name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sithuyehtun/alloc8-budget-calculator:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to IONOS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            set -e

            # 1. Install Docker
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker && systemctl start docker
            fi

            # 2. Install dependencies
            apt-get update -qq
            apt-get install -y -qq nginx ufw curl certbot python3-certbot-nginx

            # 3. Firewall
            ufw allow OpenSSH
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable

            # 4. Pull latest image
            docker pull sithuyehtun/alloc8-budget-calculator:latest

            # 5. Stop old container
            docker stop alloc8-app 2>/dev/null || true
            docker rm   alloc8-app 2>/dev/null || true

            # 6. Persistence directories
            mkdir -p /opt/alloc8/data /opt/alloc8/uploads

            # 7. Run container
            docker run -d               --name alloc8-app               --restart unless-stopped               -p 3000:3000               -v /opt/alloc8/data:/app/data               -v /opt/alloc8/uploads:/app/public/uploads               -e NODE_ENV=production               -e PORT=3000               -e DB_PATH=/app/data/data.sqlite               -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}"               -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"               -e FROM_EMAIL="${{ secrets.FROM_EMAIL }}"               -e BYTEZ_API_KEY="${{ secrets.BYTEZ_API_KEY }}"               sithuyehtun/alloc8-budget-calculator:latest

            # 8. SSL cert (first time only)
            if [ ! -f /etc/letsencrypt/live/alloc8.org/fullchain.pem ]; then
              cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.org www.alloc8.org;
                location / { proxy_pass http://localhost:3000; }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
              rm -f /etc/nginx/sites-enabled/default
              nginx -t && systemctl reload nginx
              certbot certonly --nginx -d alloc8.org -d www.alloc8.org                 --non-interactive --agree-tos --email admin@alloc8.org
            else
              certbot renew --quiet
            fi

            # 9. Nginx SSL config
            cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.org www.alloc8.org;
                return 301 https://$host$request_uri;
            }
            server {
                listen 443 ssl;
                server_name alloc8.org www.alloc8.org;
                ssl_certificate     /etc/letsencrypt/live/alloc8.org/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/alloc8.org/privkey.pem;
                include             /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
                location / {
                    proxy_pass         http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection upgrade;
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    client_max_body_size 50M;
                }
            }
            NGINX

            ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "Deployment complete - https://alloc8.org"

name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to IONOS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.IONOS_HOST }}
          username: ${{ secrets.IONOS_USER }}
          password: ${{ secrets.IONOS_PASSWORD }}
          script: |
            set -e

            # ── 1. Install Docker ──────────────────────────────────────────
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            # ── 2. Install dependencies ────────────────────────────────────
            apt-get update -qq
            apt-get install -y -qq nginx ufw curl

            # ── 3. Open firewall ports ─────────────────────────────────────
            ufw allow OpenSSH
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw allow 3000/tcp
            ufw --force enable

            # ── 4. Pull latest image from Docker Hub ───────────────────────
            docker pull sithuyehtun/alloc8-budget-calculator:latest

            # ── 5. Stop old container (if running) ─────────────────────────
            docker stop alloc8-app 2>/dev/null || true
            docker rm   alloc8-app 2>/dev/null || true

            # ── 6. Create data directories for persistence ─────────────────
            mkdir -p /opt/alloc8/data /opt/alloc8/uploads

            # ── 7. Run new container ───────────────────────────────────────
            docker run -d \
              --name alloc8-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /opt/alloc8/data:/app/data \
              -v /opt/alloc8/uploads:/app/public/uploads \
              -e NODE_ENV=production \
              -e PORT=3000 \
              -e DB_PATH=/app/data/data.sqlite \
              -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              -e RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
              -e FROM_EMAIL="${{ secrets.FROM_EMAIL }}" \
              -e BYTEZ_API_KEY="${{ secrets.BYTEZ_API_KEY }}" \
              sithuyehtun/alloc8-budget-calculator:latest

            # ── 8. Configure Nginx reverse proxy for alloc8.org ────────────
            cat > /etc/nginx/sites-available/alloc8 <<'NGINX'
            server {
                listen 80;
                server_name alloc8.org www.alloc8.org;

                location / {
                    proxy_pass         http://localhost:3000;
                    proxy_http_version 1.1;
                    proxy_set_header   Upgrade $http_upgrade;
                    proxy_set_header   Connection 'upgrade';
                    proxy_set_header   Host $host;
                    proxy_set_header   X-Real-IP $remote_addr;
                    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    client_max_body_size 50M;
                }
            }
            NGINX

            # Enable site and reload nginx
            ln -sf /etc/nginx/sites-available/alloc8 /etc/nginx/sites-enabled/alloc8
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "✓ Deployment complete — alloc8.org → localhost:3000"

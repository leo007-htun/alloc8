version: '3.8'

services:
  app:
    build: .
    container_name: alloc8-budget-calculator
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist uploads
      - ./uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/data.sqlite
      # Email configuration - set in .env, no default (do not hardcode real keys here)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@alloc8.vulkron.uk}
      # Bytez AI API - set in .env
      - BYTEZ_API_KEY=${BYTEZ_API_KEY}
      # Session secret - set in .env, no default (do not hardcode real secrets here)
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
